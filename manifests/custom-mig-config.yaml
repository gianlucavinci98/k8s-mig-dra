apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-mig-config
data:
  config.yaml: |
    version: v1
    mig-configs:
      single-1g-5gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.5gb: 1
      all-1g.5gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.5gb: 7
      all-1g.5gb.me:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.5gb+me: 1
      all-1g.10gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.10gb: 4
      all-2g.10gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          2g.10gb: 3
      all-3g.20gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          3g.20gb: 2
      all-4g.20gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          4g.20gb: 1
      all-7g.40gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          7g.40gb: 1
      all-balanced:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.5gb: 2
          2g.10gb: 1
          3g.20gb: 1
      three-2g.10gb-one-1g.10gb:
      - devices: all
        mig-enabled: true
        mig-devices:
          1g.10gb: 1
          2g.10gb: 3
      all-disabled:
      - devices: all
        mig-enabled: false
        mig-devices: {}
      all-enabled:
      - devices: all
        mig-enabled: true
        mig-devices: {}
