apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: ollama-test
  name: small-mig
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: mig.nvidia.com
            count: 1
            selectors:
              - cel:
                  expression: device.attributes["gpu.nvidia.com"].type == "mig" &&
                    device.attributes["gpu.nvidia.com"].profile == "1g.5gb"
